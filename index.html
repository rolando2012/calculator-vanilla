<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="StyleSheet" href="css/calculator_styles.css" type="text/css">
    <link rel="icon" href="assets/favicon.ico" type="image/x-ico">
</head>
<body>
    <section class="calculator_container">
        <div class="calculator_screen">
            <p class="calculator_operations" id="screen"></p>
            <div class="calculator_result" id="result">0</div>
        </div>
        <div class="calculator_buttons">
            <div class="calculator_row">
                <button class="calculator_btn-num">7</button>
                <button class="calculator_btn-num">8</button>
                <button class="calculator_btn-num">9</button>
                <button class="calculator_btn-num btn-blue">DEL</button>
                <button class="calculator_btn-num btn-blue">AC</button>
            </div>

            <div class="calculator_row">
                <button class="calculator_btn-num">4</button>
                <button class="calculator_btn-num">5</button>
                <button class="calculator_btn-num">6</button>
                <button class="calculator_btn-num">×</button>
                <button class="calculator_btn-num">÷</button>
            </div>

            <div class="calculator_row">
                <button class="calculator_btn-num">1</button>
                <button class="calculator_btn-num">2</button>
                <button class="calculator_btn-num">3</button>
                <button class="calculator_btn-num">+</button>
                <button class="calculator_btn-num">-</button>
            </div>

            <div class="calculator_row">
                <button class="calculator_btn-num">0</button>
                <button class="calculator_btn-num">.</button>
                <button class="calculator_btn-num">(</button>
                <button class="calculator_btn-num">)</button>
                <button class="calculator_btn-num">=</button>
            </div>
        </div>
    </section>

    <section class="calculator_history">
        <div class="history-container">
            <h4 class="history-title">
                Historial de operaciones
            </h4>
            <ul class="history-list" id="history">
                
            </ul>
            <button class="history_clean" id="clean"title="Borrar historial">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="icon-trash">
                    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                </svg>
            </button>
        </div>
    </section>

    <script src="js/calculator_scripts.js"></script>
</body>
</html>
